services:
  - type: web
    name: connectify-api
    env: node
    plan: free
    buildCommand: npm install && npm --workspace apps/server run build
    startCommand: npm --workspace apps/server run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: CLIENT_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
